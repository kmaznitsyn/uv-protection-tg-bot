name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy main.py constants.py translations.py --ignore-missing-imports

      - name: Check imports resolve
        run: python -c "import main; print('All imports OK')"
        env:
          BOT_TOKEN: "0000000000:fake-token-for-import-check"
